<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Profile | FoodFlow</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="assets/css/style.css" rel="stylesheet"></head><body data-page="profile"><div data-ff-header></div><main><section class="ff-page-hero compact"><div class="ff-container"><h1 class="ff-display">Your Profile</h1><p class="ff-subtitle">Personal details, saved addresses, password, and order statistics.</p></div></section><section class="py-5"><div class="ff-container" data-profile-root><div class="row g-4"><div class="col-lg-7"><form class="ff-card p-4" data-validate="profile" novalidate><h2 class="h4 fw-bold mb-3">Personal Details</h2><div class="row g-3"><div class="col-md-6"><input class="form-control ff-field" name="firstName" required placeholder="First name"></div><div class="col-md-6"><input class="form-control ff-field" name="lastName" required placeholder="Last name"></div><div class="col-md-6"><input class="form-control ff-field" name="email" type="email" required placeholder="Email"></div><div class="col-md-6"><input class="form-control ff-field" name="phone" required placeholder="Phone"></div></div><h2 class="h4 fw-bold mt-4 mb-3">Saved Address</h2><input class="form-control ff-field mb-3" name="addressLine" required placeholder="House, street, area"><div class="row g-3"><div class="col-md-6"><input class="form-control ff-field" name="city" required placeholder="City"></div><div class="col-md-6"><input class="form-control ff-field" name="pincode" required placeholder="PIN code"></div></div><h2 class="h4 fw-bold mt-4 mb-3">Change Password</h2><input class="form-control ff-field mb-3" name="newPassword" type="password" placeholder="New password"><div class="progress mb-4" style="height:10px"><div class="progress-bar bg-warning" data-password-strength style="width:0%"></div></div><button class="ff-btn ff-btn-primary" type="submit">Save Profile</button></form></div><div class="col-lg-5"><div class="row g-3" data-profile-stats><div class="col-12"><a class="ff-card p-4 d-flex justify-content-between align-items-center" href="my-orders.html"><strong>View order history</strong><span class="material-symbols-outlined">arrow_forward</span></a></div></div></div></div></div></section></main><div data-ff-footer></div><div data-ff-bottom-nav></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="assets/js/script.js"></script></body></html>
