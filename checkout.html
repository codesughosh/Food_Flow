<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Checkout | FoodFlow</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="assets/css/style.css" rel="stylesheet"></head><body data-page="cart"><div data-ff-header></div><main><section class="ff-page-hero compact"><div class="ff-container"><h1 class="ff-display">Checkout</h1><p class="ff-subtitle">Delivery details, payment method, promo code, and order summary.</p></div></section><section class="py-5"><div class="ff-container"><form class="row g-4 needs-validation" data-validate="checkout" novalidate><div class="col-lg-8"><div class="ff-card p-4 mb-4"><h2 class="h4 fw-bold mb-3">Delivery Information</h2><div class="row g-3"><div class="col-md-6"><input class="form-control ff-field" required placeholder="Full name"></div><div class="col-md-6"><input class="form-control ff-field" type="tel" required placeholder="Phone"></div><div class="col-12"><input class="form-control ff-field" required placeholder="House, street, area"></div><div class="col-md-6"><input class="form-control ff-field" required placeholder="City"></div><div class="col-md-6"><input class="form-control ff-field" required placeholder="PIN code"></div></div></div><div class="ff-card p-4"><h2 class="h4 fw-bold mb-3">Payment Method</h2><div class="d-grid gap-3"><label class="ff-card p-3"><input class="form-check-input me-2" name="pay" type="radio" checked> UPI on delivery</label><label class="ff-card p-3"><input class="form-check-input me-2" name="pay" type="radio"> Cash on delivery</label><label class="ff-card p-3"><input class="form-check-input me-2" name="pay" type="radio"> Card on delivery</label></div></div></div><aside class="col-lg-4"><div class="ff-card p-4"><h2 class="h4 fw-bold mb-3">Order Summary</h2><div data-checkout-summary></div><div class="input-group mt-4"><input class="form-control ff-field" placeholder="Promo code" value="FOODFLOW50"><button class="ff-btn ff-btn-ghost py-2 px-3" type="button" data-promo>Apply</button></div><button class="ff-btn ff-btn-primary w-100 mt-4" type="submit">Place Order</button></div></aside></form></div></section></main><div data-ff-footer></div><div data-ff-bottom-nav></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="assets/js/script.js"></script></body></html>
